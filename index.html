<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fortune Card</title>

    <link rel="stylesheet" href="css/style.css">

</head>


<body>

    <!-- พื้นหลังดวงดาว + ดาวตก -->
    <div id="starfield"></div>
    <div id="meteor-layer"></div>

    <!-- การ์ดด้านหลัง 3 ใบ -->
    <div class="cards">
        <div class="card-wrapper">
            <img class="choose-card" src="image/back.png">
        </div>

        <div class="card-wrapper">
            <img class="choose-card" src="image/back.png">
        </div>

        <div class="card-wrapper">
            <img class="choose-card" src="image/back.png">
        </div>

    </div>



    <!-- ผลลัพธ์ -->
    <div id="result">

        <div class="result-cards-row">

            <div class="result-card-wrapper">
                <img id="characterCard">
            </div>

            <div class="result-card-wrapper">
                <img id="textCard">
            </div>

        </div>

        <p id="zoomHint">🔍 คลิกที่การ์ดเพื่อขยายได้</p>

    </div>


    <!-- ขยายการ์ด (Lightbox) -->
    <div id="lightbox">
        <button id="lightboxClose" aria-label="ปิด">&times;</button>
        <img id="lightboxImg" src="" alt="">
    </div>



<script src="js/script.js"></script>

</body>

</html>
